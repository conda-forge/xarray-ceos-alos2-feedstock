{% set python_min = "3.10" %}
{% set name = "xarray-ceos-alos2" %}
{% set version = "2026.3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: dcda3b11d849c9cfcd722d53a909db13e0d4d62be21262c1a465c207b2809b6c

build:
  noarch: python
  entry_points:
    - ceos-alos2-create-cache = ceos_alos2.sar_image.cli:main
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64.0
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - cytoolz
    - python-dateutil
    - xarray
    - xarray-datatree
    - numpy
    - construct >=2.10
    - fsspec
    - platformdirs
    - exceptiongroup

test:
  imports:
    - ceos_alos2
  commands:
    - pip check
    - ceos-alos2-create-cache --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/umr-lops/xarray-ceos-alos2
  summary: xarray reader for advanced land observing satellite 2 (ALOS2) CEOS files
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - keewis
    - agrouaze
